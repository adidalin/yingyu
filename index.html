<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小学英语闪卡 (高新区凤凰学校1年级专用)</title>
    <style>
        :root {
            /* 雅致极简配色 */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%);
            --card-bg: rgba(255, 255, 255, 0.88); 
            --accent-primary: #4f46e5; /* 现代深靛蓝 */
            --accent-secondary: #06b6d4; /* 极光青 */
            --btn-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            --text-color: #1e293b; /* 优雅深灰 */
            --gray-text: #64748b;
            --border-color: #e2e8f0;
            --success-color: #10b981;
            --mistake-color: #ff7675;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        /* 优雅的流体弥散背景光斑 */
        body::before {
            content: '';
            position: absolute;
            width: 320px;
            height: 320px;
            background: rgba(165, 180, 252, 0.4);
            filter: blur(100px);
            border-radius: 50%;
            top: 5%;
            left: 5%;
            z-index: -1;
        }
        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(103, 232, 249, 0.35);
            filter: blur(100px);
            border-radius: 50%;
            bottom: 8%;
            right: 8%;
            z-index: -1;
        }

        /* 隐藏滚动条但保留滚动功能 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 10px; }

        /* ---------------- 横屏建议提示 ---------------- */
        #orientation-hint {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @media screen and (orientation: portrait) and (max-width: 800px) {
            #orientation-hint { display: flex; }
        }

        .ignore-btn {
            margin-top: 25px;
            padding: 12px 35px;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.08);
            color: white;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.25s ease;
        }
        .ignore-btn:hover, .ignore-btn:active {
            background: white;
            color: #0f172a;
            transform: translateY(-2px);
        }

        /* ---------------- 主容器 ---------------- */
        .container {
            background-color: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 95%;
            height: 95%;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255,255,255,0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* ---------------- 1. 选卡界面 ---------------- */
        #selection-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }

        h1 {
            text-align: center;
            margin: 0 0 16px 0;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-color);
            letter-spacing: -0.5px;
            background: var(--btn-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .unit-list {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
            gap: 12px;
            padding: 4px 6px 16px 4px;
            align-content: start;
        }

        /* 扁平精致卡片 */
        .unit-item {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 16px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.01);
        }

        .unit-item:hover {
            transform: translateY(-2px);
            background: #ffffff;
            border-color: #cbd5e1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
        }

        .unit-item strong { 
            display: block; 
            font-size: 1.05rem; 
            font-weight: 700;
            color: var(--text-color); 
            margin-bottom: 6px; 
        }
        .unit-item span { 
            font-size: 0.85rem; 
            font-weight: 600;
            color: var(--gray-text); 
            background: rgba(241, 245, 249, 0.8);
            padding: 3px 8px;
            border-radius: 10px;
        }

        input[type="checkbox"] { display: none; }
        
        /* 选中状态 */
        input[type="checkbox"]:checked + .unit-item {
            background-color: #ffffff;
            border-color: var(--accent-primary);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.1);
        }
        input[type="checkbox"]:checked + .unit-item strong { color: var(--accent-primary); }
        input[type="checkbox"]:checked + .unit-item span { background: rgba(79, 70, 229, 0.08); color: var(--accent-primary); }
        
        /* 选中微章 */
        input[type="checkbox"]:checked + .unit-item::after {
            content: "✓";
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--btn-gradient);
            color: white;
            font-weight: bold;
            font-size: 0.85rem;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 4px 8px rgba(79, 70, 229, 0.2);
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ---------------- 统一按钮系统 ---------------- */
        .btn {
            border: none;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1),
                        box-shadow 0.2s ease,
                        background 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 主操作：渐变 */
        .btn-primary {
            background: var(--btn-gradient);
            color: #ffffff;
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.22);
        }
        .btn-primary:active { box-shadow: 0 2px 8px rgba(79, 70, 229, 0.12); }

        /* 次要操作：浅灰 */
        .btn-secondary {
            background: #f1f5f9;
            color: var(--gray-text);
        }
        .btn-secondary:active { background: #e2e8f0; }

        /* 错题/危险：红色浅底 */
        .btn-danger {
            background: rgba(255, 118, 117, 0.1);
            color: var(--mistake-color);
            border: 1px solid rgba(255, 118, 117, 0.18);
        }
        .btn-danger:active { background: rgba(255, 118, 117, 0.18); }

        /* 选卡底栏 */
        .selection-bottom {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .selection-bottom .btn {
            padding: 15px;
        }

        /* ---------------- 2. 练习界面 ---------------- */
        #game-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            animation: slideInRight 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--gray-text);
            font-size: 1rem;
            font-weight: 700;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--border-color);
        }
        .top-info b { color: var(--text-color); }
        .top-info #round-txt { color: var(--accent-primary); font-size: 1.15rem; }
        .top-info #unit-txt { background: rgba(241, 245, 249, 0.8); padding: 4px 10px; border-radius: 10px; color: var(--accent-primary); }

        /* 卡片显示区域 */
        .card-display {
            flex: 1;
            display: flex;
            justify-content: center; 
            align-items: center;
            width: 100%;
            cursor: pointer;
            box-sizing: border-box;
            background: #ffffff;
            margin: 15px 0;
            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 10px 25px rgba(0, 0, 0, 0.02), 
                0 25px 45px rgba(0, 0, 0, 0.03),
                inset 0 1px 0 rgba(255,255,255,0.8);
            transition: transform 0.15s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.15s ease;
            position: relative;
            overflow: hidden;
        }
        .card-display:active {
            transform: scale(0.98);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.02);
        }

        #text-content {
            font-weight: 800;
            color: var(--text-color);
            text-align: center;
            line-height: 1.25;
            word-wrap: break-word;   
            overflow-wrap: break-word;
            padding: 0 12px;
            
            /* 恢复最初始桌面端字号：8rem */
            font-size: 8rem; 
        }

        /* 手机端（以及竖屏状态）：在最初始的 4.5rem 基础上小 10%，即 4.05rem */
        @media screen and (max-width: 768px), screen and (orientation: portrait) {
            #text-content {
                font-size: 4.05rem; 
            }
        }

        /* 练习底栏 */
        .bottom-bar {
            display: flex;
            gap: 10px;
            height: 64px;
        }
        .bottom-bar .btn {
            height: 100%;
        }

        /* 移动端横向或极矮屏幕自适应适配 */
        @media screen and (max-height: 580px) {
            .container { padding: 15px; }
            h1 { font-size: 1.4rem; margin-bottom: 8px; }
            .bottom-bar { height: 50px; }
            .btn { font-size: 0.95rem; border-radius: 14px; }
            .card-display { margin: 8px 0; border-radius: 18px; }
        }

        /* ---------------- 3. 错题本界面 ---------------- */
        #mistake-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            animation: slideInRight 0.35s ease;
        }

        .mistake-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .mistake-header h2 {
            margin: 0;
            color: var(--text-color);
            font-size: 1.4rem;
            font-weight: 800;
        }

        .mistake-header .badge {
            background: rgba(255, 118, 117, 0.1);
            color: var(--mistake-color);
            padding: 5px 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .mistake-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }

        .mistake-item {
            background: #fffcfc;
            border: 1px solid rgba(255, 118, 117, 0.1);
            border-left: 4px solid var(--mistake-color);
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(255, 118, 117, 0.02);
        }

        .mistake-item-text .text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 4px;
            word-break: break-word;
        }

        .mistake-item-text .unit {
            font-size: 0.8rem;
            color: var(--gray-text);
            font-weight: 600;
        }

        .mistake-item .count {
            background: var(--mistake-color);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            margin-left: 12px;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(255, 118, 117, 0.2);
        }

        .mistake-empty {
            text-align: center;
            padding: 50px 20px;
            color: var(--gray-text);
            font-size: 1rem;
            font-weight: 600;
        }

        .mistake-bottom {
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }
        .mistake-bottom .btn {
            padding: 15px;
        }

        /* ---------------- 标记提示 ---------------- */
        .mark-hint {
            text-align: center;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--mistake-color);
            min-height: 1.2em;
            margin: 6px 0 4px;
        }

        /* ---------------- Toast 提示 ---------------- */
        #toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            padding: 20px 40px;
            border-radius: 28px;
            font-size: 1.4rem;
            font-weight: 700;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            pointer-events: none;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            line-height: 1.4;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #toast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ---------------- 动画库 ---------------- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.6); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- 横屏提示 -->
    <div id="orientation-hint">
        <div style="font-size: 4rem; margin-bottom: 15px;">📱 ⟳</div>
        <h2 style="margin:0; font-size: 1.8rem; font-weight: 800;">建议横屏使用</h2>
        <p style="color: #cbd5e1; font-size: 1rem; line-height: 1.5; margin-top: 8px;">横屏体验更佳！<br>竖屏会自动缩放字号以完全适配屏幕</p>
        <button class="ignore-btn" onclick="document.getElementById('orientation-hint').style.display='none'">
            忽略，继续竖屏
        </button>
    </div>

    <!-- 轮次完成提示框 -->
    <div id="toast"></div>

    <div class="container">
        
        <!-- 选择内容 -->
        <div id="selection-screen">
            <h1>🌈 请选择练习内容</h1>
            <div class="unit-list">
                <!-- 全空初始状态 -->
                <input type="checkbox" id="u1_w" value="1_w">
                <label for="u1_w" class="unit-item"><strong>Unit 1 第一单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u1_s" value="1_s">
                <label for="u1_s" class="unit-item"><strong>Unit 1 第一单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u2_w" value="2_w">
                <label for="u2_w" class="unit-item"><strong>Unit 2 第二单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u2_s" value="2_s">
                <label for="u2_s" class="unit-item"><strong>Unit 2 第二单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u3_w" value="3_w">
                <label for="u3_w" class="unit-item"><strong>Unit 3 第三单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u3_s" value="3_s">
                <label for="u3_s" class="unit-item"><strong>Unit 3 第三单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u4_w" value="4_w">
                <label for="u4_w" class="unit-item"><strong>Unit 4 第四单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u4_s" value="4_s">
                <label for="u4_s" class="unit-item"><strong>Unit 4 第四单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u5_w" value="5_w">
                <label for="u5_w" class="unit-item"><strong>Unit 5 第五单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u5_s" value="5_s">
                <label for="u5_s" class="unit-item"><strong>Unit 5 第五单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u6_w" value="6_w">
                <label for="u6_w" class="unit-item"><strong>Unit 6 第六单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u6_s" value="6_s">
                <label for="u6_s" class="unit-item"><strong>Unit 6 第六单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u7_s" value="7_s">
                <label for="u7_s" class="unit-item"><strong>✨ 拓展内容 ✨</strong><span>句子 Sentences</span></label>
            </div>
            <div class="selection-bottom">
                <button class="btn btn-danger" style="flex:0.5" onclick="viewMistakeBook()">📚 错题本</button>
                <button class="btn btn-primary" style="flex:1" onclick="startGame()">▶ 开始练习</button>
            </div>
        </div>

        <!-- 卡片显示 -->
        <div id="game-screen">
            <div class="top-info">
                <span>第 <b id="round-txt">1</b> 轮</span>
                <span id="unit-txt">Unit 1</span>
                <span>剩余: <b id="left-txt">10</b></span>
            </div>

            <div class="card-display" onclick="nextCard()">
                <div id="text-content">Ready</div>
            </div>
            
            <div id="mark-hint" class="mark-hint"></div>

            <div class="bottom-bar">
                <button class="btn btn-secondary" style="flex:0.8" onclick="exitGame()">⟲ 退出</button>
                <button class="btn btn-secondary" style="flex:0.6" onclick="prevCard()">👈</button>
                <button class="btn btn-danger" id="mistake-btn" style="flex:1.1" onclick="markMistake()">❌ 不认识</button>
                <button class="btn btn-primary" style="flex:1.4" onclick="nextCard()">继续 ➔</button>
            </div>
        </div>

        <!-- 错题本界面 -->
        <div id="mistake-screen">
            <div class="mistake-header">
                <h2>📚 错题本</h2>
                <div class="badge" id="mistake-count">0个</div>
            </div>
            <div class="mistake-list" id="mistake-list-container">
                <div class="mistake-empty">暂无错题 (´∇｀)</div>
            </div>
            <div class="mistake-bottom">
                <button class="btn btn-secondary" style="flex:1" onclick="backFromMistakeBook()">返回</button>
                <button class="btn btn-primary" id="practice-mistake-btn" style="flex:1.3" onclick="startMistakePractice()">▶ 练习错题</button>
                <button class="btn btn-danger" style="flex:1.1" onclick="clearMistakeBook()">清空错题本</button>
            </div>
        </div>
    </div>

                "Ha ha! It's Aunt Lucy and her cat!", "It has two long arms and two big hands.", 
                "It has four big hands, three long legs and three small feet.", "It has two short legs and two big feet.", 
                "It has four arms and four legs.", "This is my toy. His name is Ted.", "He has a big head.", 
                "This girl swims fast.", "She has long arms.", "This boy runs fast.", "He has strong legs.", 
                "This boy plays basketball well.", "He has big hands!"
            ],
            
            "5_w":["home", "bed", "table", "sofa", "room", "sit down", "next", "day", "clean", "tidy", "OK", "amazing", "snow", "house", "tall", "live"],
            "5_s":[
                "It's a bed.", "It's a table.", "It's a sofa.", "Big rooms.", "Small rooms.", "It's my home!", 
                "Tiantian, come to my home. Let's play!", "Oh, so many things!", "Here's the sofa. Please sit down.", 
                "Come to my room. It's my bed.", "Oh, so many things!", "It's my table.", "Oh, so many things!", 
                "The next day", "It's clean and tidy now. Let's play.", "Here's the sofa.", "My bed is clean.", 
                "It's my table.", "This is my home. It's a sofa. It's yellow.", "Amazing homes in China", 
                "This is my home. It's a snow house.", "Look at my room. It's small. It has a small table and a small bed.", 
                "This is my home. It's a tulou. It's very big and tall!", "Many families live in a tulou. Look, it has so many rooms."
            ],
            
            "6_w":["time", "tell", "Mr", "wolf", "eight", "nine", "ten", "eleven", "twelve", "birthday", "lunch", "not", "yet", "busy", "clock"],
            "6_s":[
                "What's the time?", "Tell the time, Mr Wolf!", "It's eight.", "It's nine.", "It's ten.", 
                "It's eleven.", "It's twelve. Run!", "Happy birthday, Dad!", "Thank you, Toby!", 
                "Let's have lunch together!", "It's eleven.", "Dad is not home yet.", "It's twelve.", 
                "Dad is busy.", "I know!", "Happy Birthday", "Look at the pictures.", "Tell the time.", 
                "Amazing clocks", "Big Ben, London", "The clock tower of the Customs House, Shanghai", "The Century Clock, Tianjin"
            ],
            
            "7_s":[
                "This is Shandong.", "Let's visit some famous houses in Shandong!", "It's Li Qingzhao's old home. It's nice.", 
                "It's Wang Xizhi's old home. It's big!", "Look at the houses!", "They're cool.", "It's a seaweed house.", 
                "Look! It's a siheyuan!", "I love Liuzi opera.", "This is Zhang Fei. Look at his face! It's black and white.", 
                "Bao Zheng has a black face.", "Guan Yu has a red face.", "This man has a white face.", "I love animals.", 
                "Let's look at some animals in Jinan Zoo!", "Look at the monkey! He is so cute.", "Look at the pandas!", 
                "They are Ya Ji and Hua Ao. They are lovely!", "Now let's look at some fun 'animals'!", "Look! Zhu Bajie has two big ears.", 
                "Look at the tigers! They have big eyes!", "Look! It's a rabbit. It's lovely."
            ]
        };

        // 错题本本地缓存配置
        const MISTAKE_STORAGE_KEY = 'yingyu_mistake_book';
        const MISTAKE_EXPIRE_DAYS = 30; // 未登录情况下错题本缓存保留天数

        let playQueue = [];
        let index = 0;
        let round = 1;
        let mistakeBook = loadMistakeBook(); // 启动时从本地缓存恢复
        let isMarked = false;
        let isMistakePractice = false; // 是否处于"错题练习"模式

        // ============ 工具函数 ============

        // Fisher-Yates 洗牌算法
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // 获取单元显示名称
        function getUnitName(u) {
            if (!u) return "未知单元";
            if (u === "7_s") {
                return "✨ 拓展 句子";
            }
            let parts = u.split('_');
            if (parts.length < 2) return "Unit " + u;
            let unitNum = parts[0];
            let type = parts[1] === "w" ? "单词" : "句子";
            return "Unit " + unitNum + " " + type;
        }

        // Toast 提示
        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerHTML = msg;
            toast.classList.add('show');
            
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                hideToast();
            }, 1500);
        }

        function hideToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('show');
            if (toastTimeout) clearTimeout(toastTimeout);
        }

        // ============ 错题本本地缓存 ============

        // 从 localStorage 读取错题本（带过期检查）
        function loadMistakeBook() {
            try {
                const raw = localStorage.getItem(MISTAKE_STORAGE_KEY);
                if (!raw) return [];
                const parsed = JSON.parse(raw);
                if (!parsed || typeof parsed !== 'object') return [];
                const now = Date.now();
                const savedAt = parsed.savedAt || 0;
                const expireMs = MISTAKE_EXPIRE_DAYS * 24 * 60 * 60 * 1000;
                if (savedAt && (now - savedAt > expireMs)) {
                    // 超过保留期，清除过期数据
                    localStorage.removeItem(MISTAKE_STORAGE_KEY);
                    return [];
                }
                const list = Array.isArray(parsed.list) ? parsed.list.filter(m => m && m.t && m.u) : [];
                return list;
            } catch (e) {
                return [];
            }
        }

        // 保存错题本到 localStorage（每次保存刷新时间戳，活跃使用不会过期）
        function saveMistakeBook() {
            try {
                if (!Array.isArray(mistakeBook) || mistakeBook.length === 0) {
                    localStorage.removeItem(MISTAKE_STORAGE_KEY);
                    return;
                }
                const payload = {
                    savedAt: Date.now(),
                    list: mistakeBook
                };
                localStorage.setItem(MISTAKE_STORAGE_KEY, JSON.stringify(payload));
            } catch (e) {
                // 隐私模式 / 存储空间不足时静默失败，不影响使用
            }
        }

        // ============ 选择界面 ============

        function startGame() {
            const checks = document.querySelectorAll('input[type="checkbox"]:checked');
            if (checks.length === 0) { 
                alert("💡 请先选择您要练习的内容哦~"); 
                return; 
            }

            hideToast();
            isMarked = false;

            playQueue = [];
            checks.forEach(c => {
                const u = c.value;
                if (data[u]) {
                    data[u].forEach(txt => playQueue.push({t: txt, u: u}));
                }
            });

            shuffle(playQueue);
            index = 0;
            round = 1;

            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            render();
        }

        // ============ 游戏界面 ============

        function nextCard() {
            hideToast();
            isMarked = false;
            document.getElementById('mark-hint').innerText = '';

            index++;
            if (index >= playQueue.length) {
                if (isMistakePractice) {
                    // 错题练习一轮结束
                    if (mistakeBook.length === 0) {
                        showToast('🎉 太棒了！错题全部掌握！');
                    } else {
                        showToast('🎉 本轮练习完成！<br><span style="font-size:1.1rem;color:#a5b4fc;">还剩 ' + mistakeBook.length + ' 题继续加油</span>');
                    }
                    setTimeout(() => exitGame(), 1800);
                    return;
                }
                round++;
                index = 0;
                shuffle(playQueue);
                showToast("🎉 恭喜！第 " + (round - 1) + " 轮完成<br><span style='font-size:1.1rem; color:#a5b4fc;'>为您开启第 " + round + " 轮</span>");
            }
            render();
        }

        function prevCard() {
            hideToast();
            isMarked = false;
            document.getElementById('mark-hint').innerText = '';

            index--;
            if (index < 0) {
                index = playQueue.length - 1;
            }
            render();
        }

        function markMistake() {
            const item = playQueue[index];
            if (!item) return;

            // 错题练习模式：点击表示"已掌握"，从错题本移除并进入下一题
            if (isMistakePractice) {
                mistakeBook = mistakeBook.filter(m => !(m && m.t === item.t && m.u === item.u));
                saveMistakeBook();
                if (mistakeBook.length === 0) {
                    showToast('🎉 太棒了！错题全部掌握！');
                    setTimeout(() => exitGame(), 1500);
                    return;
                }
                // 前进到下一题（不调用 nextCard 以保留进度反馈）
                index++;
                if (index >= playQueue.length) {
                    showToast('🎉 本轮练习完成！<br><span style="font-size:1.1rem;color:#a5b4fc;">还剩 ' + mistakeBook.length + ' 题继续加油</span>');
                    setTimeout(() => exitGame(), 1800);
                    return;
                }
                isMarked = false;
                render();
                return;
            }

            if (isMarked) {
                mistakeBook = mistakeBook.filter(m => !(m && m.t === item.t && m.u === item.u));
                isMarked = false;
                document.getElementById('mark-hint').innerText = '已取消标记';
            } else {
                const existing = mistakeBook.find(m => m && m.t === item.t && m.u === item.u);
                if (existing) {
                    existing.count++;
                } else {
                    mistakeBook.push({t: item.t, u: item.u, count: 1});
                }
                isMarked = true;
                document.getElementById('mark-hint').innerText = '✓ 已标记为不认识';
            }
            saveMistakeBook();
        }

        function render() {
            const item = playQueue[index];
            if (!item) return;

            const textEl = document.getElementById('text-content');

            // 写入文本
            textEl.innerText = item.t;

            // 单元信息
            if (isMistakePractice) {
                document.getElementById('unit-txt').innerText = '📚 错题练习';
            } else {
                document.getElementById('unit-txt').innerText = getUnitName(item.u);
            }
            document.getElementById('round-txt').innerText = round;

            // 剩余数量：练习模式显示错题本剩余，普通模式显示队列剩余
            if (isMistakePractice) {
                document.getElementById('left-txt').innerText = mistakeBook.length;
            } else {
                let left = playQueue.length - (index + 1);
                document.getElementById('left-txt').innerText = left < 0 ? 0 : left;
            }

            // 重置标记状态显示
            if (Array.isArray(mistakeBook)) {
                isMarked = mistakeBook.some(m => m && m.t === item.t && m.u === item.u);
            } else {
                isMarked = false;
                mistakeBook = [];
            }

            const markHint = document.getElementById('mark-hint');
            if (isMistakePractice) {
                // 练习模式不显示"已标记"提示，避免误导
                markHint.innerText = '';
            } else if (isMarked) {
                markHint.innerText = '✓ 已标记为不认识';
            } else {
                markHint.innerText = '';
            }
        }

        function exitGame() {
            isMistakePractice = false;
            const mistakeBtn = document.getElementById('mistake-btn');
            if (mistakeBtn) mistakeBtn.innerText = '❌ 不认识';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'flex';
        }

        // ============ 错题本 ============

        function viewMistakeBook() {
            const container = document.getElementById('mistake-list-container');
            const badge = document.getElementById('mistake-count');
            const practiceBtn = document.getElementById('practice-mistake-btn');

            badge.innerText = mistakeBook.length + '个';
            if (practiceBtn) {
                practiceBtn.disabled = (!mistakeBook || mistakeBook.length === 0);
            }

            if (mistakeBook.length === 0) {
                container.innerHTML = '<div class="mistake-empty">暂无错题 (´∇｀)</div>';
            } else {
                let html = '';
                mistakeBook.forEach(item => {
                    if (item) {
                        const unitName = getUnitName(item.u);
                        html += `
                            <div class="mistake-item">
                                <div class="mistake-item-text">
                                    <div class="text">${escapeHtml(item.t)}</div>
                                    <div class="unit">${unitName}</div>
                                </div>
                                <div class="count">${item.count || 1}</div>
                            </div>
                        `;
                    }
                });
                container.innerHTML = html;
            }
            
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('mistake-screen').style.display = 'flex';
        }

        // 开始错题练习：用错题本内容构建练习队列
        function startMistakePractice() {
            if (!mistakeBook || mistakeBook.length === 0) {
                showToast('错题本还是空的哦~');
                return;
            }
            hideToast();
            isMistakePractice = true;
            isMarked = false;

            playQueue = mistakeBook.map(m => ({t: m.t, u: m.u}));
            shuffle(playQueue);
            index = 0;
            round = 1;

            // 切换"不认识"按钮为"已掌握"
            const mistakeBtn = document.getElementById('mistake-btn');
            if (mistakeBtn) mistakeBtn.innerText = '✓ 已掌握';

            document.getElementById('mistake-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            render();
        }

        function backFromMistakeBook() {
            document.getElementById('mistake-screen').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'flex';
        }

        function clearMistakeBook() {
            if (confirm('确定要清空所有错题吗？')) {
                mistakeBook = [];
                saveMistakeBook();
                viewMistakeBook();
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // ============ 监听器 ============

        // 横屏自动隐藏遮罩
        window.addEventListener("orientationchange", function() {
            if (Math.abs(window.orientation) === 90) {
                 document.getElementById('orientation-hint').style.display='none';
            }
        });
    </script>
