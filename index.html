<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小学英语闪卡 (高新区凤凰学校1年级专用)</title>
    <style>
        :root {
            /* 充满活力的儿童风渐变背景 */
            --bg-gradient: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            --card-bg: rgba(255, 255, 255, 0.95); /* 半透明毛玻璃质感 */
            --text-color: #2d3436;
            --accent-color: #0984e3; 
            --accent-hover: #74b9ff;
            --success-color: #00b894;
            --gray-text: #636e72;
            --border-color: #dfe6e9;
        }

        body {
            margin: 0;
            padding: 0;
            /* 回退至原生系统字体，无衬线 */
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隐藏滚动条但保留滚动功能 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* ---------------- 横屏建议提示 ---------------- */
        #orientation-hint {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(45, 52, 54, 0.9);
            backdrop-filter: blur(8px);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @media screen and (orientation: portrait) and (max-width: 800px) {
            #orientation-hint { display: flex; }
        }

        .ignore-btn {
            margin-top: 30px;
            padding: 12px 35px;
            border: 2px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .ignore-btn:hover, .ignore-btn:active {
            background: white;
            color: #2d3436;
            transform: scale(1.05);
        }

        /* ---------------- 主容器 ---------------- */
        .container {
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            width: 96%;
            height: 96%;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(255,255,255,0.5);
        }

        /* ---------------- 1. 选卡界面 ---------------- */
        #selection-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }

        h1 {
            text-align: center;
            margin: 0 0 20px 0;
            font-size: 2rem;
            font-weight: bold;
            color: transparent;
            background: linear-gradient(90deg, #6c5ce7, #0984e3);
            -webkit-background-clip: text;
            background-clip: text;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .unit-list {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 5px 10px 20px 5px;
            align-content: start;
        }

        /* 可爱风选项卡片 */
        .unit-item {
            background: #ffffff;
            border: 3px solid var(--border-color);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); /* Q弹过渡 */
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .unit-item:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            border-color: #b2bec3;
        }

        .unit-item strong { 
            display: block; 
            font-size: 1.15rem; 
            font-weight: bold;
            color: #2d3436; 
            margin-bottom: 8px; 
        }
        .unit-item span { 
            font-size: 0.95rem; 
            font-weight: 600;
            color: var(--gray-text); 
            background: #f1f2f6;
            padding: 4px 10px;
            border-radius: 12px;
        }

        input[type="checkbox"] { display: none; }
        
        /* 选中状态 */
        input[type="checkbox"]:checked + .unit-item {
            background-color: #f0f7ff;
            border-color: var(--accent-color);
            box-shadow: 0 8px 25px rgba(9, 132, 227, 0.2);
            transform: translateY(-2px);
        }
        input[type="checkbox"]:checked + .unit-item strong { color: var(--accent-color); }
        input[type="checkbox"]:checked + .unit-item span { background: #dfe6e9; color: var(--accent-color); }
        
        /* 选中状态的可小对号徽章 */
        input[type="checkbox"]:checked + .unit-item::after {
            content: "✓";
            position: absolute;
            top: -10px;
            right: -10px;
            background: linear-gradient(135deg, #00cec9, #0984e3);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 炫酷开始按钮 */
        .start-btn {
            margin-top: 15px;
            padding: 18px;
            background: linear-gradient(135deg, #6c5ce7, #0984e3);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 2px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.35);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .start-btn:active {
            transform: scale(0.97);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.25);
        }

        /* ---------------- 2. 练习界面 ---------------- */
        #game-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            animation: slideInRight 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--gray-text);
            font-size: 1.1rem;
            font-weight: bold;
            padding: 5px 15px 15px 15px;
            border-bottom: 3px dashed #dfe6e9;
        }
        .top-info b { color: var(--text-color); }
        .top-info #round-txt { color: #d63031; font-size: 1.3rem; }
        .top-info #unit-txt { background: #f1f2f6; padding: 4px 12px; border-radius: 12px; color: var(--accent-color); }

        /* 文字显示区域 - 3D卡片质感 */
        .card-display {
            flex: 1;
            display: flex;
            justify-content: center; 
            align-items: center;
            width: 100%;
            cursor: pointer;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
            background: #ffffff;
            margin: 20px 0;
            border-radius: 24px;
            border: 1px solid #f5f6fa;
            /* 3D 悬浮阴影 */
            box-shadow: 0 15px 35px rgba(0,0,0,0.05), 0 5px 15px rgba(0,0,0,0.03);
            /* 去掉了点击时的变色和缩放动画，保持点击时卡片稳如泰山 */
        }

        #text-content {
            font-weight: bold;
            color: #2d3436;
            text-align: center;
            line-height: 1.1;
            word-wrap: break-word;   
            overflow-wrap: break-word;
            /* 文字轻微立体感 */
            text-shadow: 2px 2px 0px rgba(0,0,0,0.03);
        }

        /* 字体大小设置 */
        #text-content { font-size: 8rem; }
        @media screen and (orientation: portrait) {
            #text-content { font-size: 4.5rem; }
        }

        /* 底部按钮 */
        .bottom-bar {
            display: flex;
            gap: 16px;
            height: 70px;
        }

        .btn {
            border: none;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            height: 100%;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-exit { 
            width: 28%; 
            background: #f1f2f6; 
            color: #636e72; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .btn-exit:active { transform: scale(0.95); background: #dfe6e9; }
        
        .btn-next { 
            width: 72%; 
            background: linear-gradient(135deg, #00cec9, #0984e3); 
            color: white;
            box-shadow: 0 8px 25px rgba(9, 132, 227, 0.3);
            letter-spacing: 1px;
        }
        .btn-next:active { 
            transform: scale(0.97);
            box-shadow: 0 4px 12px rgba(9, 132, 227, 0.2);
        }

        /* ---------------- 3. Toast 提示框 ---------------- */
        #toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(45, 52, 54, 0.95);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 24px 45px;
            border-radius: 35px;
            font-size: 1.6rem;
            font-weight: bold;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            pointer-events: none;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            border: 2px solid rgba(255,255,255,0.1);
            line-height: 1.4;
        }
        #toast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ---------------- 动画库 ---------------- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- 横屏提示 -->
    <div id="orientation-hint">
        <div style="font-size: 4.5rem; margin-bottom: 20px;">📱 ⟳</div>
        <h2 style="margin:0; font-size: 2rem;">建议横屏使用</h2>
        <p style="color: #dfe6e9; font-size: 1.1rem; line-height: 1.6;">横屏字体更加震撼哦！<br>竖屏会自动折行以适应屏幕</p>
        <button class="ignore-btn" onclick="document.getElementById('orientation-hint').style.display='none'">
            忽略，继续竖屏
        </button>
    </div>

    <!-- 轮次完成提示框 -->
    <div id="toast"></div>

    <div class="container">
        
        <!-- 选择内容 -->
        <div id="selection-screen">
            <h1>🌈 请选择练习内容</h1>
            <div class="unit-list">
                <!-- 默认去掉了 checked 属性，一开始全空 -->
                <input type="checkbox" id="u1_w" value="1_w">
                <label for="u1_w" class="unit-item"><strong>Unit 1 第一单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u1_s" value="1_s">
                <label for="u1_s" class="unit-item"><strong>Unit 1 第一单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u2_w" value="2_w">
                <label for="u2_w" class="unit-item"><strong>Unit 2 第二单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u2_s" value="2_s">
                <label for="u2_s" class="unit-item"><strong>Unit 2 第二单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u3_w" value="3_w">
                <label for="u3_w" class="unit-item"><strong>Unit 3 第三单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u3_s" value="3_s">
                <label for="u3_s" class="unit-item"><strong>Unit 3 第三单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u4_w" value="4_w">
                <label for="u4_w" class="unit-item"><strong>Unit 4 第四单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u4_s" value="4_s">
                <label for="u4_s" class="unit-item"><strong>Unit 4 第四单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u5_w" value="5_w">
                <label for="u5_w" class="unit-item"><strong>Unit 5 第五单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u5_s" value="5_s">
                <label for="u5_s" class="unit-item"><strong>Unit 5 第五单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u6_w" value="6_w">
                <label for="u6_w" class="unit-item"><strong>Unit 6 第六单元</strong><span>单词 Words</span></label>
                
                <input type="checkbox" id="u6_s" value="6_s">
                <label for="u6_s" class="unit-item"><strong>Unit 6 第六单元</strong><span>句子 Sentences</span></label>

                <input type="checkbox" id="u7_s" value="7_s">
                <label for="u7_s" class="unit-item"><strong>✨ 拓展内容 ✨</strong><span>句子 Sentences</span></label>
            </div>
            <button class="start-btn" onclick="startGame()">▶ 开始练习 (Start)</button>
        </div>

        <!-- 卡片显示 -->
        <div id="game-screen">
            <div class="top-info">
                <span>第 <b id="round-txt">1</b> 轮</span>
                <span id="unit-txt">Unit 1</span>
                <span>剩余: <b id="left-txt">10</b></span>
            </div>

            <!-- 点击整个卡片也可以切换下一个 -->
            <div class="card-display" onclick="nextCard()">
                <div id="text-content">Ready</div>
            </div>

            <div class="bottom-bar">
                <button class="btn btn-exit" onclick="exitGame()">⟲ 退出</button>
                <button class="btn btn-next" onclick="nextCard()">下一个 ➔</button>
            </div>
        </div>
    </div>

    <script>
        const data = {
            "1_w":["pet", "bird", "dog", "cat", "fish", "rabbit", "friend"],
            "1_s":[
                "It's Yaya. It's my rabbit.", "It's Maomao. It's my cat.", "It's Dora. It's my bird.", 
                "It's Snowball. It's my dog.", "And it's Orange. It's my fish!", "It's Nini. It's my cat.", 
                "It's my friend Liu Yun's cat."
            ],
            
            "2_w":["animal", "they", "welcome", "zoo", "tiger", "lion", "bear", "monkey", "panda", "cute", "picture", "which", "from"],
            "2_s":[
                "What are they?", "Welcome to the zoo!", "Look! A tiger.", "Look! Two lions.", 
                "Look! Three bears.", "Look! Four monkeys.", "And a panda!", "It's the zoo!", 
                "It's a tiger.", "They're lions.", "Look at the bears.", "They're big.", 
                "They're monkeys.", "They're cute.", "Look at picture 1.", "What are they?", "Look at my zoo!"
            ],
            
            "3_w":["face", "eye", "ear", "nose", "mouth", "we", "twin", "have", "small", "same", "know", "now", "long", "hair", "short", "different", "touch", "your"],
            "3_s":[
                "My eyes.", "My ears.", "My nose.", "My mouth.", "This is my face!", "Hi, I'm Meimei.", 
                "I'm Feifei.", "We are twins.", "I have big eyes.", "Me too.", "I have a small nose.", 
                "I have a small mouth.", "We look the same.", "I know!", "Now I have long hair.", 
                "I have short hair.", "We are different now.", "Play the game.", "Touch your nose.", 
                "Touch your ears.", "Touch your eyes.", "Touch your mouth.", "This is Wang Na.", 
                "No, it's me!", "I have big eyes and big ears.", "My mouth and nose are small.", 
                "I have a big mouth.", "I have a long nose.", "I have no ears."
            ],
            
            "4_w":["body", "come on", "boy", "girl", "rock", "move", "head", "hand", "arm", "leg", "foot", "feet", "robot", "cool", "monster", "aunt", "her", "part", "toy", "his", "name", "he", "swim", "fast", "she", "run", "strong", "basketball", "well"],
            "4_s":[
                "Come on, boys and girls.", "Let’s do the body rock!", "Move your head.", "Move your hands.", 
                "Move your arms.", "Move your legs and feet!", "one foot", "two feet", 
                "Look at my robot! It has a big head and two big feet!", "Cool! And it has long arms and long legs!", 
                "Oh! No! Look!", "It has three heads and three arms!", "It's a monster!", 
                "Ha ha! It's Aunt Lucy and her cat!", "It has two long arms and two big hands.", 
                "It has four big hands, three long legs and three small feet.", "It has two short legs and two big feet.", 
                "It has four arms and four legs.", "This is my toy. His name is Ted.", "He has a big head.", 
                "This girl swims fast.", "She has long arms.", "This boy runs fast.", "He has strong legs.", 
                "This boy plays basketball well.", "He has big hands!"
            ],
            
            "5_w":["home", "bed", "table", "sofa", "room", "sit down", "next", "day", "clean", "tidy", "OK", "amazing", "snow", "house", "tall", "live"],
            "5_s":[
                "It's a bed.", "It's a table.", "It's a sofa.", "Big rooms.", "Small rooms.", "It's my home!", 
                "Tiantian, come to my home. Let's play!", "Oh, so many things!", "Here's the sofa. Please sit down.", 
                "Come to my room. It's my bed.", "Oh, so many things!", "It's my table.", "Oh, so many things!", 
                "The next day", "It's clean and tidy now. Let's play.", "Here's the sofa.", "My bed is clean.", 
                "It's my table.", "This is my home. It's a sofa. It's yellow.", "Amazing homes in China", 
                "This is my home. It's a snow house.", "Look at my room. It's small. It has a small table and a small bed.", 
                "This is my home. It's a tulou. It's very big and tall!", "Many families live in a tulou. Look, it has so many rooms."
            ],
            
            "6_w":["time", "tall", "Mr", "wolf", "eight", "nine", "ten", "eleven", "twelve", "birthday", "lunch", "not", "yet", "busy", "clock"],
            "6_s":[
                "What's the time?", "Tell the time, Mr Wolf!", "It's eight.", "It's nine.", "It's ten.", 
                "It's eleven.", "It's twelve. Run!", "Happy birthday, Dad!", "Thank you, Toby!", 
                "Let's have lunch together!", "It's eleven.", "Dad is not home yet.", "It's twelve.", 
                "Dad is busy.", "I know!", "Happy Birthday", "Look at the pictures.", "Tell the time.", 
                "Amazing clocks", "Big Ben, London", "The clock tower of the Customs House, Shanghai", "The Century Clock, Tianjin"
            ],
            
            "7_s":[
                "This is Shandong.", "Let's visit some famous houses in Shandong!", "It's Li Qingzhao's old home. It's nice.", 
                "It's Wang Xizhi's old home. It's big!", "Look at the houses!", "They're cool.", "It's a seaweed house.", 
                "Look! It's a siheyuan!", "I love Liuzi opera.", "This is Zhang Fei. Look at his face! It's black and white.", 
                "Bao Zheng has a black face.", "Guan Yu has a red face.", "This man has a white face.", "I love animals.", 
                "Let's look at some animals in Jinan Zoo!", "Look at the monkey! He is so cute.", "Look at the pandas!", 
                "They are Ya Ji and Hua Ao. They are lovely!", "Now let's look at some fun “animals”!", "Look! Zhu Bajie has two big ears.", 
                "Look at the tigers! They have big eyes!", "Look! It's a rabbit. It's lovely."
            ]
        };

        let playQueue =[];
        let index = 0;
        let round = 1;

        // 横屏自动隐藏遮罩
        window.addEventListener("orientationchange", function() {
            if (Math.abs(window.orientation) === 90) {
                 document.getElementById('orientation-hint').style.display='none';
            }
        });

        function startGame() {
            const checks = document.querySelectorAll('input[type="checkbox"]:checked');
            if (checks.length === 0) { alert("💡 请先选择您要练习的内容哦~"); return; }

            hideToast(); // 开始时确保清空提示框

            playQueue =[];
            checks.forEach(c => {
                const u = c.value;
                data[u].forEach(txt => playQueue.push({t: txt, u: u}));
            });

            shuffle(playQueue);
            index = 0;
            round = 1;

            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            render();
        }

        function exitGame() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'flex';
        }

        function nextCard() {
            // 用户点击了下一个，立刻隐藏提示（不遮挡视线）
            hideToast();

            index++;
            if (index >= playQueue.length) {
                // 当前轮次结束
                round++;
                index = 0;
                shuffle(playQueue);
                showToast("🎉 恭喜！第 " + (round - 1) + " 轮完成<br><span style='font-size:1.2rem; color:#ffeaa7;'>为您开启第 " + round + " 轮</span>");
            }
            render();
        }

        function render() {
            const item = playQueue[index];
            const textEl = document.getElementById('text-content');
            
            // 文本内容赋值
            textEl.innerText = item.t;
            
            // 顶部信息渲染
            let unitStr = "";
            if (item.u === "7_s") {
                unitStr = "✨ 拓展 句子";
            } else {
                let unitNum = item.u.split('_')[0];
                let type = item.u.split('_')[1] === "w" ? "单词" : "句子";
                unitStr = "Unit " + unitNum + " " + type;
            }
            
            document.getElementById('unit-txt').innerText = unitStr;
            document.getElementById('round-txt').innerText = round;
            
            let left = playQueue.length - (index + 1);
            document.getElementById('left-txt').innerText = left < 0 ? 0 : left;
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }

        // 显示 Toast 提示框
        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerHTML = msg;
            toast.classList.add('show');
            
            if (toastTimeout) clearTimeout(toastTimeout);
            
            toastTimeout = setTimeout(() => {
                hideToast();
            }, 1500); // 弹窗停留时间 1.5 秒
        }

        // 隐藏 Toast 提示框
        function hideToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('show');
            if (toastTimeout) clearTimeout(toastTimeout);
        }
    </script>
</body>
</html>
